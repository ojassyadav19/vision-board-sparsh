name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase config
        working-directory: vision-board/public
        run: |
          cat > firebase-config.js << 'JSEOF'
          var FIREBASE_CONFIG = {
            apiKey: "${{ secrets.VITE_FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}",
            databaseURL: "${{ secrets.VITE_FIREBASE_DATABASE_URL }}",
            projectId: "${{ secrets.VITE_FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.VITE_FIREBASE_APP_ID }}"
          };
          JSEOF

      - name: Copy index.html as 404.html for SPA routing
        working-directory: vision-board/public
        run: cp index.html 404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: vision-board/public
